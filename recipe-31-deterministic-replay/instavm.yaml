schema_version: 2
kind: service
slug: recipe-31-deterministic-replay
title: Deterministic Replay
version: 0.1.0
summary: CassetteReplayClient replays a checked-in LLM tape for deterministic debugging.
category: agents
runtime: python-fastapi
deploy:
  kind: upload_and_run
source:
  include:
  - app.py
  - agent.py
  - lib/
  - fixtures/
  - requirements.txt
  - instavm.yaml
  - README.md
  exclude:
  - tests/
  setup_command: python -m pip install --no-cache-dir -r requirements.txt
vm:
  memory_mb: 1024
  vcpu_count: 1
  timeout_seconds: 86400
app:
  port: 8000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 120
run:
  workdir: .
  start_command: python -m uvicorn app:app --host 0.0.0.0 --port 8000
post_deploy_notes:
- Bind api.openai.com via vault for live replay; cassette works offline.
- POST /replay returns REPLAY_OK from fixtures/cassette.jsonl.
secrets: []
vault:
  required: false
  hosts:
  - api.openai.com
egress:
  mode: allowlist
  include_vault_hosts: true
  allowed_domains:
  - api.openai.com
  allow_package_managers: true
