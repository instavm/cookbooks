schema_version: 2
kind: service
slug: recipe-21-standup-digest
title: Standup Digest
version: 0.1.0
summary: GitHub and Linear to standup summary.
category: agents
runtime: python-fastapi
deploy:
  kind: upload_and_run
source:
  include:
  - app.py
  - agent.py
  - lib/
  - integrations/
  - requirements.txt
  - instavm.yaml
  - README.md
  exclude:
  - tests/
  - fixtures/
  setup_command: python -m pip install --no-cache-dir -r requirements.txt
vm:
  memory_mb: 1024
  vcpu_count: 1
  timeout_seconds: 86400
app:
  port: 8000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 120
run:
  workdir: .
  start_command: python -m uvicorn app:app --host 0.0.0.0 --port 8000
vault:
  required: true
  hosts:
  - api.openai.com
  - api.anthropic.com
  - api.github.com
  - api.linear.app
egress:
  mode: allowlist
  include_vault_hosts: true
  allowed_domains:
  - api.github.com
  - api.linear.app
  - hooks.slack.com
  allow_package_managers: true
secrets: []
post_deploy_notes:
- Run `instavm vault setup .` — bind api.github.com, api.linear.app, slack.com.
- GET /health, POST /run?dry_run=1
