schema_version: 2
kind: service
slug: recipe-17-podcast-prep-agent
title: Podcast Prep Agent
version: 0.1.0
summary: Transcript to LLM show notes with optional Cartesia TTS stub on InstaVM.
category: agents
runtime: python-fastapi
deploy:
  kind: upload_and_run
source:
  include:
  - app.py
  - agent.py
  - lib/
  - integrations/
  - requirements.txt
  - instavm.yaml
  - README.md
  exclude:
  - tests/
  - fixtures/
  setup_command: python -m pip install --no-cache-dir -r requirements.txt
vm:
  memory_mb: 1024
  vcpu_count: 1
  timeout_seconds: 86400
app:
  port: 8000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 120
run:
  workdir: .
  start_command: python -m uvicorn app:app --host 0.0.0.0 --port 8000
vault:
  required: true
  hosts:
  - api.openai.com
  - api.anthropic.com
  - api.cartesia.ai
egress:
  mode: allowlist
  include_vault_hosts: true
  allowed_domains:
  - api.cartesia.ai
  allow_package_managers: true
secrets: []
post_deploy_notes:
- "Run `instavm vault setup .` \u2014 upstream keys are vault placeholders injected\
  \ at egress (OPENAI_KEY, EXA_KEY, etc.)."
- POST /transcript?dry_run=1; set with_tts=true to exercise Cartesia stub.
