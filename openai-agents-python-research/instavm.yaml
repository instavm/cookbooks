schema_version: 1
slug: openai-agents-python-research
title: OpenAI Agents Python Research
version: "0.1.0"
summary: Browser-based research memo generator adapted from the OpenAI Agents Python research examples.
category: agents
runtime: python-fastapi
deploy:
  kind: upload_and_run
vm:
  memory_mb: 2048
  vcpu_count: 2
  timeout_seconds: 7200
app:
  port: 8000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 180
run:
  workdir: .
  start_command: python -m uvicorn app:app --host 0.0.0.0 --port 8000
secrets:
  - name: openai_api_key
    required: true
    prompt: OpenAI API key
    env_name: OPENAI_API_KEY
post_deploy_notes:
  - Ask for a market brief, company analysis, or technical topic survey from the browser.
  - Set OPENAI_MODEL before deploy if you want a different hosted model.
build:
  context: .
  dockerfile: Dockerfile
artifact:
  oci_image: docker.io/instavm/cookbooks-openai-agents-python-research:0.1.0
  snapshot_name: cookbook/openai-agents-python-research:0.1.0
  snapshot_visibility: public_system
source:
  include:
    - app.py
    - requirements.txt
    - README.md
    - Dockerfile
    - instavm.yaml
  exclude: []
  setup_command: python -m pip install --no-cache-dir -r requirements.txt
