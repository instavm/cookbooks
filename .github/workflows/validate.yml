name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pyyaml
      - run: python scripts/validate_manifests.py
      - run: bash scripts/scan_secrets.sh
      - run: bash scripts/run_recipe_tests.sh
      - run: bash scripts/run_recipe_e2e.sh
