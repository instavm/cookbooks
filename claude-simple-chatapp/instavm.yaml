schema_version: 1
slug: claude-simple-chatapp
title: Claude Chat
version: "0.2.0"
summary: Browser chat for Claude with a clean interface and live conversation threads. Uses the InstaVM Vault — no real Anthropic key enters this cookbook.
category: agents
runtime: node-express-react
deploy:
  kind: upload_and_run
vm:
  memory_mb: 2048
  vcpu_count: 2
  timeout_seconds: 7200
app:
  port: 3001
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 180
run:
  workdir: .
  # ANTHROPIC_API_KEY is intentionally a placeholder string. The platform's
  # egress MITM proxy substitutes the real credential from the bound org vault
  # at TLS write time, so the real key never enters this VM. CLI ≥ 0.22.0
  # auto-binds any vault with a service mapping for api.anthropic.com (see
  # vault: below). The vault binding must use auth_type=api_key with header
  # x-api-key and a credential named ANTHROPIC_KEY.
  start_command: >-
    export NVM_DIR="$HOME/.nvm" &&
    . "$NVM_DIR/nvm.sh" &&
    nvm use 22 >/dev/null &&
    : "${ANTHROPIC_API_KEY:=ANTHROPIC_KEY}" &&
    export ANTHROPIC_API_KEY &&
    NODE_OPTIONS="--require $PWD/server/claude-code-dns-patch.cjs" PORT=3001 npm start
secrets: []
# Auto-bind any org vault that has a service mapping for these hosts.
vault:
  required: true
  hosts:
    - api.anthropic.com
post_deploy_notes:
  - Create a chat and send a first message from the browser UI.
  - The app keeps chat state in memory, so restarting the service resets conversations.
  - Before deploying, create an org vault and bind it to api.anthropic.com (one-time). Use auth_type=api_key, header=x-api-key, credential=ANTHROPIC_KEY. See the root README "One-time vault setup" section.
build:
  context: .
  dockerfile: Dockerfile
artifact:
  oci_image: docker.io/instavm/cookbooks-claude-simple-chatapp:0.1.0
  snapshot_name: cookbook/claude-simple-chatapp:0.1.0
  snapshot_visibility: public_system
source:
  include:
    - client
    - server
    - package.json
    - postcss.config.js
    - tailwind.config.js
    - tsconfig.json
    - vite.config.ts
    - README.md
    - CLAUDE.md
    - instavm.yaml
    - Dockerfile
  exclude: []
  setup_command: >-
    export NVM_DIR="$HOME/.nvm" &&
    if [ ! -s "$NVM_DIR/nvm.sh" ]; then
      curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash;
    fi &&
    . "$NVM_DIR/nvm.sh" &&
    nvm install 22 &&
    nvm use 22 &&
    npm install &&
    NODE_OPTIONS="--require $PWD/server/claude-code-dns-patch.cjs" npm run build
