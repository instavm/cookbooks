schema_version: 1
slug: claude-simple-chatapp
title: Claude Chat
version: "0.1.0"
summary: Browser chat for Claude with a clean interface and live conversation threads.
category: agents
runtime: node-express-react
deploy:
  kind: upload_and_run
vm:
  memory_mb: 2048
  vcpu_count: 2
  timeout_seconds: 7200
app:
  port: 3001
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 180
run:
  workdir: .
  start_command: >-
    export NVM_DIR="$HOME/.nvm" &&
    . "$NVM_DIR/nvm.sh" &&
    nvm use 22 >/dev/null &&
    NODE_OPTIONS="--require $PWD/server/claude-code-dns-patch.cjs" PORT=3001 npm start
secrets:
  - name: anthropic_api_key
    required: true
    prompt: Anthropic API key
    env_name: ANTHROPIC_API_KEY
post_deploy_notes:
  - Create a chat and send a first message from the browser UI.
  - The app keeps chat state in memory, so restarting the service resets conversations.
build:
  context: .
  dockerfile: Dockerfile
artifact:
  oci_image: docker.io/instavm/cookbooks-claude-simple-chatapp:0.1.0
  snapshot_name: cookbook/claude-simple-chatapp:0.1.0
  snapshot_visibility: public_system
source:
  include:
    - client
    - server
    - package.json
    - postcss.config.js
    - tailwind.config.js
    - tsconfig.json
    - vite.config.ts
    - README.md
    - CLAUDE.md
    - instavm.yaml
    - Dockerfile
  exclude: []
  setup_command: >-
    export NVM_DIR="$HOME/.nvm" &&
    if [ ! -s "$NVM_DIR/nvm.sh" ]; then
      curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash;
    fi &&
    . "$NVM_DIR/nvm.sh" &&
    nvm install 22 &&
    nvm use 22 &&
    npm install &&
    NODE_OPTIONS="--require $PWD/server/claude-code-dns-patch.cjs" npm run build
