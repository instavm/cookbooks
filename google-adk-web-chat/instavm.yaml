schema_version: 1
slug: google-adk-web-chat
title: City Guide
version: "0.2.0"
summary: Travel planning chat for itineraries, neighborhoods, and timing advice. Uses the InstaVM Vault — no real Google/Gemini key enters this cookbook.
category: agents
runtime: python-fastapi
deploy:
  kind: upload_and_run
vm:
  memory_mb: 2048
  vcpu_count: 2
  timeout_seconds: 7200
app:
  port: 8000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 180
run:
  workdir: .
  # GOOGLE_API_KEY is intentionally a placeholder string. The platform's egress
  # MITM proxy substitutes the real credential from the bound org vault at TLS
  # write time, so the real key never enters this VM. CLI ≥ 0.22.0 auto-binds
  # any vault with a service mapping for generativelanguage.googleapis.com
  # (see vault: below). The vault binding must use auth_type=api_key with
  # header x-goog-api-key and a credential named GOOGLE_KEY.
  start_command: >-
    : "${GOOGLE_API_KEY:=GOOGLE_KEY}" &&
    export GOOGLE_API_KEY &&
    python -m uvicorn app:app --host 0.0.0.0 --port 8000
secrets: []
# Auto-bind any org vault that has a service mapping for these hosts.
vault:
  required: true
  hosts:
    - generativelanguage.googleapis.com
post_deploy_notes:
  - Ask for itinerary, neighborhood, or travel planning help from the browser.
  - Set GOOGLE_MODEL before deploy if you want a different Gemini model.
  - Before deploying, create an org vault and bind it to generativelanguage.googleapis.com (one-time). Use auth_type=api_key, header=x-goog-api-key, credential=GOOGLE_KEY. See the root README "One-time vault setup" section.
build:
  context: .
  dockerfile: Dockerfile
artifact:
  oci_image: docker.io/instavm/cookbooks-google-adk-web-chat:0.1.0
  snapshot_name: cookbook/google-adk-web-chat:0.1.0
  snapshot_visibility: public_system
source:
  include:
    - app.py
    - requirements.txt
    - README.md
    - Dockerfile
    - instavm.yaml
  exclude: []
  setup_command: python -m pip install --no-cache-dir -r requirements.txt
