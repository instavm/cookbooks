schema_version: 1
slug: openai-agents-python-injection-scanner
title: Injection Scanner
version: "0.2.0"
summary: Streaming prompt-injection scanner that runs adversarial tooling against an uploaded document inside a fresh, egress-restricted InstaVM child sandbox. The orchestrator's OpenAI credential comes from the org InstaVM Vault — no real OpenAI key enters this cookbook.
category: agents
runtime: python-fastapi
deploy:
  kind: upload_and_run
vm:
  memory_mb: 2048
  vcpu_count: 2
  timeout_seconds: 7200
app:
  port: 8000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 240
run:
  workdir: .
  # OPENAI_API_KEY is intentionally a placeholder string. The platform's egress
  # MITM proxy substitutes the real credential from the bound org vault at TLS
  # write time, so the real key never enters this VM. CLI ≥ 0.22.0 auto-binds
  # any vault with a service mapping for api.openai.com (see vault: below).
  start_command: >-
    : "${OPENAI_API_KEY:=OPENAI_KEY}" &&
    export OPENAI_API_KEY &&
    python -m uvicorn app:app --host 0.0.0.0 --port 8000
secrets:
  - name: instavm_api_key
    required: true
    prompt: InstaVM API key (used by the orchestrator to spawn per-request child sandboxes)
    env_name: INSTAVM_API_KEY
# Auto-bind any org vault that has a service mapping for these hosts.
vault:
  required: true
  hosts:
    - api.openai.com
post_deploy_notes:
  - Drop a Markdown, JSON, HTML, or text file in the browser. Each scan runs in a fresh disposable microVM with no API keys and no internet egress.
  - Before deploying, create an org vault and bind it to api.openai.com (one-time). See the root README "One-time vault setup" section.
  - Set OPENAI_MODEL to choose a different hosted model (default gpt-5.4-nano).
  - Set INJECTION_MAX_BYTES to override the 256 KB upload cap.
build:
  context: .
  dockerfile: Dockerfile
artifact:
  oci_image: docker.io/instavm/cookbooks-openai-agents-python-injection-scanner:0.1.0
  snapshot_name: cookbook/openai-agents-python-injection-scanner:0.1.0
  snapshot_visibility: public_system
source:
  include:
    - app.py
    - requirements.txt
    - README.md
    - Dockerfile
    - instavm.yaml
  exclude: []
  setup_command: python -m pip install --no-cache-dir -r requirements.txt
