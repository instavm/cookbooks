schema_version: 2
kind: service
slug: recipe-30-mcp-server-hosting
title: MCP Server Hosting
version: 0.1.0
summary: Minimal MCP SSE stub with vault proxy placeholder docs.
category: agents
runtime: python-fastapi
deploy:
  kind: upload_and_run
source:
  include:
  - app.py
  - lib/
  - requirements.txt
  - instavm.yaml
  - README.md
  exclude:
  - tests/
  setup_command: python -m pip install --no-cache-dir -r requirements.txt
vm:
  memory_mb: 1024
  vcpu_count: 1
  timeout_seconds: 86400
app:
  port: 8000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 120
run:
  workdir: .
  start_command: python -m uvicorn app:app --host 0.0.0.0 --port 8000
egress:
  mode: allowlist
  include_vault_hosts: true
  allowed_domains: []
  allow_package_managers: true
post_deploy_notes:
- No third-party vault hosts — MCP SSE stub only.
- GET /health and GET /mcp/sse on the share URL.
secrets: []
vault:
  required: false
  hosts:
  - api.openai.com
  - api.anthropic.com
