schema_version: 1
slug: dspy-hosted-chat
title: DSPy Chat
version: "0.2.0"
summary: Structured browser chat powered by DSPy. Uses the InstaVM Vault — no real OpenRouter key enters this cookbook.
category: agents
runtime: python-fastapi
deploy:
  kind: upload_and_run
vm:
  memory_mb: 2048
  vcpu_count: 2
  timeout_seconds: 7200
app:
  port: 8000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 180
run:
  workdir: .
  # OPENROUTER_API_KEY is intentionally a placeholder string. The platform's
  # egress MITM proxy substitutes the real credential from the bound org vault
  # at TLS write time, so the real key never enters this VM. CLI ≥ 0.22.0
  # auto-binds any vault with a service mapping for openrouter.ai (see vault:
  # below). The vault binding must use auth_type=bearer with credential
  # OPENROUTER_KEY.
  start_command: >-
    : "${OPENROUTER_API_KEY:=OPENROUTER_KEY}" &&
    export OPENROUTER_API_KEY &&
    python -m uvicorn app:app --host 0.0.0.0 --port 8000
secrets: []
# Auto-bind any org vault that has a service mapping for these hosts.
vault:
  required: true
  hosts:
    - openrouter.ai
post_deploy_notes:
  - By default the app uses a compact Gemma-family model through OpenRouter.
  - Set OPENAI_COMPAT_MODEL or OPENAI_COMPAT_API_BASE before deploy to use a different model or provider.
  - "Before deploying, bind an org vault to openrouter.ai. Easy path (CLI ≥ 0.23.0): `instavm deploy .` will walk you through it. Manual path: bind with auth_type=bearer, credential=OPENROUTER_API_KEY (see root README)."
build:
  context: .
  dockerfile: Dockerfile
artifact:
  oci_image: docker.io/instavm/cookbooks-dspy-hosted-chat:0.1.0
  snapshot_name: cookbook/dspy-hosted-chat:0.1.0
  snapshot_visibility: public_system
source:
  include:
    - app.py
    - requirements.txt
    - README.md
    - Dockerfile
    - instavm.yaml
  exclude: []
  setup_command: python -m pip install --no-cache-dir -r requirements.txt
