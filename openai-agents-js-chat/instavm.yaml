schema_version: 1
slug: openai-agents-js-chat
title: OpenAI Agents JS Chat
version: "0.1.0"
summary: Next.js streaming chat app adapted from the OpenAI Agents JS AI SDK UI example.
category: agents
runtime: node-nextjs
deploy:
  kind: upload_and_run
vm:
  memory_mb: 2048
  vcpu_count: 2
  timeout_seconds: 7200
app:
  port: 3000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 180
run:
  workdir: .
  start_command: >-
    export NVM_DIR="$HOME/.nvm" &&
    . "$NVM_DIR/nvm.sh" &&
    nvm use 22 >/dev/null &&
    PORT=3000 npm start
secrets:
  - name: openai_api_key
    required: true
    prompt: OpenAI API key
    env_name: OPENAI_API_KEY
post_deploy_notes:
  - Open the root page and send a prompt through the chat UI.
build:
  context: .
  dockerfile: Dockerfile
artifact:
  oci_image: docker.io/instavm/cookbooks-openai-agents-js-chat:0.1.0
  snapshot_name: cookbook/openai-agents-js-chat:0.1.0
  snapshot_visibility: public_system
source:
  include:
    - next-env.d.ts
    - README.md
    - package.json
    - tsconfig.json
    - next.config.ts
    - scripts
    - src
    - instavm.yaml
    - Dockerfile
  exclude: []
  setup_command: >-
    export NVM_DIR="$HOME/.nvm" &&
    if [ ! -s "$NVM_DIR/nvm.sh" ]; then
      curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash;
    fi &&
    . "$NVM_DIR/nvm.sh" &&
    nvm install 22 &&
    nvm use 22 &&
    npm install &&
    npm run build
