schema_version: 1
slug: openai-agents-js-chat
title: Sky Guide Chat
version: "0.2.0"
summary: Streaming browser chat about the night sky with tool calls and support handoffs. Uses the InstaVM Vault — no real OpenAI key ever enters this cookbook.
category: agents
runtime: node-nextjs
deploy:
  kind: upload_and_run
vm:
  memory_mb: 2048
  vcpu_count: 2
  timeout_seconds: 7200
app:
  port: 3000
  healthcheck_path: /health
  share_public_default: true
  readiness_timeout_seconds: 180
run:
  workdir: .
  # OPENAI_API_KEY is intentionally a placeholder string. The platform's egress
  # MITM proxy substitutes the real credential from the bound org vault at TLS
  # write time, so the real key never enters this VM. CLI ≥ 0.22.0 auto-binds
  # any vault that has a service mapping for api.openai.com (see vault: above).
  start_command: >-
    export HOME="${HOME:-/root}" &&
    export NVM_DIR="$HOME/.nvm" &&
    . "$NVM_DIR/nvm.sh" &&
    nvm use 22 >/dev/null &&
    : "${OPENAI_API_KEY:=OPENAI_KEY}" &&
    export OPENAI_API_KEY &&
    PORT=3000 npm start
secrets: []
# Auto-bind any org vault that has a service mapping for these hosts.
# The orchestrator gets `OPENAI_API_KEY=OPENAI_KEY` (a literal placeholder);
# the egress MITM swaps in the real credential at TLS write time. CLI ≥ 0.22.0
# discovers and binds matching vaults automatically; pass `--vault VAULT_ID`
# to override.
vault:
  required: true
  hosts:
    - api.openai.com
post_deploy_notes:
  - Open the root page and send a prompt through the chat UI.
  - One-time vault setup (per org). See the root README "One-time vault setup" section. The cookbook itself never touches the real OpenAI key.
build:
  context: .
  dockerfile: Dockerfile
artifact:
  oci_image: docker.io/instavm/cookbooks-openai-agents-js-chat:0.1.0
  snapshot_name: cookbook/openai-agents-js-chat:0.1.0
  snapshot_visibility: public_system
source:
  include:
    - next-env.d.ts
    - README.md
    - package.json
    - tsconfig.json
    - next.config.ts
    - scripts
    - src
    - instavm.yaml
    - Dockerfile
  exclude: []
  setup_command: >-
    export NVM_DIR="$HOME/.nvm" &&
    if [ ! -s "$NVM_DIR/nvm.sh" ]; then
      curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash;
    fi &&
    . "$NVM_DIR/nvm.sh" &&
    nvm install 22 &&
    nvm use 22 &&
    npm install &&
    npm run build
